name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build, test and validate API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and test
        run: mvn -B clean verify

      - name: Lint Bicep IaC
        run: |
          az bicep install
          az bicep lint --file infra/main.bicep

      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli lint src/docs/openapi.yaml

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-openapi
          path: src/docs/openapi.yaml
          if-no-files-found: error

      - name: SonarCloud analysis
        if: vars.SONAR_ORGANIZATION != ''
        run: |
          SONAR_ARGS="-Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} -Dsonar.projectKey=apchavez_clean-arch-azure-functions-java"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SONAR_ARGS="$SONAR_ARGS \
              -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }}"
          fi
          mvn -B sonar:sonar $SONAR_ARGS
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
