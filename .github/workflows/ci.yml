name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build, test and validate API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and test
        run: mvn -B clean verify

      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli lint src/docs/openapi.yaml

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-openapi
          path: src/docs/openapi.yaml
          if-no-files-found: error

      - name: SonarCloud analysis
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SONAR_ORGANIZATION != ''
        run: mvn -B sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} -Dsonar.projectKey=apchavez_clean-arch-azure-functions-java
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
