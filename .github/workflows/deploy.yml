name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, test, prod]
        default: dev
      deploy_api_management:
        description: "Deploy API Management facade"
        required: true
        type: boolean
        default: false
      enable_apim_jwt:
        description: "Enable JWT validation policy in APIM"
        required: true
        type: boolean
        default: false
      run_integration_tests:
        description: "Run Postman integration tests after deploy"
        required: true
        type: boolean
        default: true
      deploy_alerts:
        description: "Deploy Azure Monitor email alerts"
        required: true
        type: boolean
        default: false
      allow_public_network_access:
        description: "Allow public network access to cloud data services"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Azure resources and Functions
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and test
        run: mvn -B clean verify

      - name: Deploy infrastructure
        id: infra
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            PARAM_FILE="infra/parameters.${{ inputs.environment }}.json"
            DEPLOYMENT_NAME="clinic-${{ inputs.environment }}-${{ github.run_number }}"
            az deployment sub create \
              --location eastus \
              --template-file infra/main.bicep \
              --parameters "$PARAM_FILE" \
              --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
              --parameters deployApiManagement=${{ inputs.deploy_api_management }} \
              --parameters enableApiManagementJwtValidation=${{ inputs.enable_apim_jwt }} \
              --parameters apiManagementJwtOpenIdConfigUrl='${{ vars.APIM_JWT_OPENID_CONFIG_URL }}' \
              --parameters apiManagementJwtAudience='${{ vars.APIM_JWT_AUDIENCE }}' \
              --parameters deployAlerts=${{ inputs.deploy_alerts }} \
              --parameters alertEmail='${{ vars.ALERT_EMAIL }}' \
              --parameters allowPublicNetworkAccess=${{ inputs.allow_public_network_access }} \
              --name "$DEPLOYMENT_NAME"
            az deployment sub show --name "$DEPLOYMENT_NAME" --query properties.outputs --output json > deployment-outputs.json
            echo "function_app=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query properties.outputs.functionAppName.value --output tsv)" >> "$GITHUB_OUTPUT"
            echo "resource_group=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query properties.outputs.resourceGroup.value --output tsv)" >> "$GITHUB_OUTPUT"
            echo "apim_url=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query properties.outputs.apiManagementGatewayUrl.value --output tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy Function App
        run: >
          mvn -B azure-functions:deploy
          -DfunctionAppName=${{ steps.infra.outputs.function_app }}
          -DfunctionResourceGroup=${{ steps.infra.outputs.resource_group }}

      - name: Install Newman
        if: inputs.run_integration_tests
        run: npm install --global newman

      - name: Run integration tests
        if: inputs.run_integration_tests
        run: |
          BASE_URL="https://${{ steps.infra.outputs.function_app }}.azurewebsites.net/api"
          if [ "${{ inputs.enable_apim_jwt }}" = "false" ] && [ -n "${{ steps.infra.outputs.apim_url }}" ] && [ "${{ steps.infra.outputs.apim_url }}" != "null" ]; then
            BASE_URL="${{ steps.infra.outputs.apim_url }}/clinic"
          fi
          newman run postman/clinic-azure.postman_collection.json \
            --env-var baseUrl="$BASE_URL" \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Upload deployment outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-outputs-${{ inputs.environment }}
          path: |
            deployment-outputs.json
            newman-results.xml
          if-no-files-found: warn
